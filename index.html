<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>铁肩学校通知中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Microsoft YaHei",sans-serif;background:#f0f2f5;color:#222;}
.container{max-width:1100px;margin:0 auto;padding:0 14px;}

.site-header{background:linear-gradient(135deg,#1a73e8,#0d47a1);color:#fff;text-align:center;padding:28px 0;}
.site-title{font-size:26px;}
.site-subtitle{margin-top:6px;opacity:.85;font-size:14px;}

.main-nav{display:flex;gap:8px;margin:18px 0 12px;flex-wrap:wrap;}
.nav-tab{padding:9px 16px;border:none;border-radius:8px;cursor:pointer;background:#fff;font-size:14px;}
.nav-tab.active,.nav-tab:hover{background:#1a73e8;color:#fff;}

.content-section{display:none;animation:fadeIn .25s;}
.content-section.active{display:block;}
.page-title{margin:12px 0 14px;font-size:20px;}

/* 新闻 */
.news-entrance{background:#fff;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.news-entrance:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.news-icon{font-size:48px;margin-bottom:12px;}
.news-text{font-size:22px;font-weight:700;color:#1a73e8;margin-bottom:8px;}
.news-hint{font-size:13px;color:#999;}

/* 作业 */
.grade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
.grade-card{background:#fff;border-radius:12px;padding:14px;}
.grade-name{font-size:16px;margin-bottom:8px;color:#1a73e8;border-bottom:1px solid #eee;padding-bottom:6px;}
.subject-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #f0f0f0;font-size:14px;}
.subject-name{font-weight:600;}
.subject-hw{color:#555;}

/* 安排 */
.schedule-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;font-size:14px;}
.schedule-table th{background:#1a73e8;color:#fff;padding:9px 12px;text-align:left;}
.schedule-table td{padding:9px 12px;border-bottom:1px solid #f0f0f0;}
.schedule-table tr:hover td{background:#f5f9ff;}
.reminder-list{background:#fff3cd;border-radius:12px;padding:14px;margin-top:14px;}
.reminder-list h3{margin-bottom:6px;}
.reminder-list li{padding:4px 0;font-size:14px;}

/* 时间 */
.time-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;}
.routine-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
.routine-item{display:flex;justify-content:space-between;padding:7px 10px;background:#f5f9ff;border-radius:8px;font-size:14px;}
.routine-time{font-weight:600;color:#1a73e8;}
.routine-event{color:#555;}

/* 课程表 */
.course-table{overflow-x:auto;margin-top:12px;}
.course-table table{width:100%;border-collapse:collapse;font-size:13px;}
.course-table th,.course-table td{border:1px solid #ddd;padding:6px;text-align:center;}
.course-table th{background:#1a73e8;color:#fff;}

footer{text-align:center;padding:18px 0;color:#777;font-size:13px;margin-top:20px;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>

<body>
<header class="site-header">
  <div class="container">
    <h1 class="site-title" id="siteTitle"></h1>
    <p class="site-subtitle">通知 · 作业 · 安排 · 一站式校园服务平台</p>
  </div>
</header>

<main class="container">
  <nav class="main-nav">
    <button class="nav-tab active" onclick="showSection('home')">🏠 主页</button>
    <button class="nav-tab" onclick="showSection('homework')">📚 作业</button>
    <button class="nav-tab" onclick="showSection('schedule')">📅 安排</button>
    <button class="nav-tab" onclick="showSection('time')">⏰ 时间</button>
  </nav>

  <!-- 主页 -->
  <section id="home" class="content-section active">
    <h2 class="page-title">📢 学校新闻</h2>
    <div class="news-entrance" onclick="goWechat()">
      <div class="news-icon">📰</div>
      <div class="news-text">查看新闻</div>
      <div class="news-hint">点击进入铁肩学校公众号</div>
    </div>
  </section>

  <!-- 作业 -->
  <section id="homework" class="content-section">
    <h2 class="page-title">📚 各年级作业</h2>
    <div class="grade-grid" id="gradeGrid"></div>
  </section>

  <!-- 安排 -->
  <section id="schedule" class="content-section">
    <h2 class="page-title">📅 本周工作安排</h2>
    <table class="schedule-table">
      <thead><tr><th>时间</th><th>事项</th><th>部门</th><th>地点</th></tr></thead>
      <tbody id="scheduleBody"></tbody>
    </table>
    <div class="reminder-list">
      <h3>📋 重点提醒</h3>
      <ul id="reminderList"></ul>
    </div>
  </section>

  <!-- 时间 -->
  <section id="time" class="content-section">
    <h2 class="page-title">⏰ 时间管理</h2>
    <div class="time-card">
      <h3>📅 每日作息</h3>
      <div class="routine-list" id="routineList"></div>
    </div>
    <div class="time-card">
      <h3>📚 课程表</h3>
      <div class="course-table" id="courseTable"></div>
    </div>
  </section>
</main>

<footer>
  <div class="container" id="footerText"></div>
</footer>

<script src="data.js"></script>
<script>
let data = window.__SCHOOL_DATA__;

function showSection(id){
  document.querySelectorAll('.content-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}

function goWechat(){
  window.open(data.wechatUrl,'_blank');
}

function render(){
  document.getElementById('siteTitle').textContent = data.schoolName;
  document.getElementById('footerText').textContent = `© ${new Date().getFullYear()} ${data.schoolName}`;

  // 作业
  document.getElementById('gradeGrid').innerHTML =
    Object.entries(data.homework).map(([g,sub])=>`
      <div class="grade-card">
        <div class="grade-name">${g}</div>
        ${Object.entries(sub).map(([k,v])=>`
          <div class="subject-row">
            <span class="subject-name">${k}</span>
            <span class="subject-hw">${v||'无作业'}</span>
          </div>
        `).join('')}
      </div>
    `).join('');

  // 安排
  document.getElementById('scheduleBody').innerHTML =
    data.schedule.map(s=>`
      <tr><td>${s.time}</td><td>${s.event}</td><td>${s.department}</td><td>${s.location}</td></tr>
    `).join('');
  document.getElementById('reminderList').innerHTML =
    data.reminders.map(r=>`<li>${r}</li>`).join('');

  // 作息
  document.getElementById('routineList').innerHTML =
    data.routine.map(r=>`
      <div class="routine-item">
        <span class="routine-time">${r.time}</span>
        <span class="routine-event">${r.event}</span>
      </div>
    `).join('');

  // 课程表
  document.getElementById('courseTable').innerHTML = `
    <table>
      <tr><th>节次</th>${data.courseTable.headers.map(h=>`<th>${h}</th>`).join('')}</tr>
      ${data.courseTable.rows.map(r=>`
        <tr><td>${r.period}</td>${r.courses.map(c=>`<td>${c}</td>`).join('')}</tr>
      `).join('')}
    </table>
  `;
}

render();
</script>
</body>
</html>
